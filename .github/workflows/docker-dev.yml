name: Docker Build, Health Tests, Push

on:
  push:
    branches:
      - dev
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to run (e.g., feature/my-branch or dev)'
        required: true
        default: 'dev'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  # 빌드 시작
  build-health:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # 1) 체크아웃: PR/수동실행/푸시 모두에서 올바른 ref
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.head_ref || github.ref }}

      # 2) .env 복원 (포크 PR은 시크릿 미제공 → 건너뛰기)
      - name: Restore .env from ENV secret
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        run: |
          cat <<'EOF' > .env
          ${{ secrets.ENV }}
          EOF

      - name: Note when DB tests will be skipped (fork PR)
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true }}
        run: echo "Fork PR detected → secrets not available; DB health check will be skipped."

      # 3) Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4) 빌드 + 로컬 로드(중요): 이후 docker run 가능
      - name: Build Docker image (load to local engine)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: geomemo-backend:dev-${{ github.sha }}

      - name: Verify image locally available
        run: docker image inspect geomemo-backend:dev-${{ github.sha }}

      # 5) 컨테이너 실행
      - name: Run container in background
        run: |
          docker run -d --name geomemo-test \
            -p 8000:8000 \
            $( [ -f .env ] && echo "--env-file .env" ) \
            geomemo-backend:dev-${{ github.sha }}

      # 6) 준비 대기: /api/health가 200 될 때까지 대기
      - name: Wait for service readiness (HTTP 200 on /api/health)
        run: |
          for i in {1..20}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health || true)
            echo "Attempt $i => HTTP $code"
            if [ "$code" -eq 200 ]; then
              exit 0
            fi
            sleep 3
          done
          echo "Service did not become healthy on /api/health" >&2
          exit 1

      # 7) 앱 헬스 체크
      - name: HTTP health check
        run: curl -sSf http://localhost:8000/api/health

      # 8) 로그 및 정리(항상)
      - name: Stop and remove container
        if: always()
        run: |
          docker logs geomemo-test || true
          docker stop geomemo-test || true
          docker rm geomemo-test || true

      # 9) AWS 자격증명 구성 (dev 브랜치 push에만)
      - name: Configure AWS credentials
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/dev' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 10) Amazon ECR 로그인 (v2)
      - name: Login to Amazon ECR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/dev' }}
        uses: aws-actions/amazon-ecr-login@v2

      # 11) 이미지 태깅 & 푸시 (dev 브랜치 push에만)
      - name: Tag and push image to ECR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/dev' }}
        run: |
          IMAGE_URI=067258969425.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/geomemo
          docker tag geomemo-backend:dev-${{ github.sha }} $IMAGE_URI:dev-${{ github.sha }}
          docker push $IMAGE_URI:dev-${{ github.sha }}

  # EC2 배포 시작: 단계별로 세분화
  deploy-to-ec2:
    needs: build-health
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/dev'
    timeout-minutes: 20
    steps:
      # 1) (EC2) ECR 로그인 (EC2 인스턴스에 ECR ReadOnly 역할이 있어야 함)
      - name: EC2 - ECR login
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      # 2) (EC2) 이미지 Pull
      - name: EC2 - docker pull image
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/geomemo:dev-${{ github.sha }}

      # 3) (EC2) 기존 컨테이너 정지/삭제
      - name: EC2 - stop & remove old container
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            docker stop geomemo || true
            docker rm geomemo || true

      # 4) (EC2) 새 컨테이너 실행
      - name: EC2 - run new container
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            docker run -d \
              --name geomemo \
              -p 8000:8000 \
              --env-file /home/${{ secrets.EC2_USER }}/app/.env \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/geomemo:dev-${{ github.sha }}

      # 5) (EC2) 준비 대기: /api/health 200까지 반복 확인
      - name: EC2 - wait until /api/health 200
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            for i in {1..20}; do
              code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health || true)
              echo "Attempt $i => HTTP $code"
              if [ "$code" -eq 200 ]; then
                exit 0
              fi
              sleep 3
            done
            echo "Service did not become healthy on /api/health" >&2
            exit 1

      # 6) (EC2) 앱 헬스 체크 단일 검증
      - name: EC2 - app health check
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            curl -sSf http://localhost:8000/api/health

      # 7) (EC2) DB 헬스 체크 (엔드포인트가 있다면)
      - name: EC2 - DB health check
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            curl -sSf http://localhost:8000/api/dbhealth

      # 8) (Runner) 디스코드 알림 - 성공 시
      - name: Notify Discord (success)
        if: ${{ success() }}
        run: |
          curl -H "Content-Type: application/json" \
               -d '{
                 "content": "✅ *배포 성공*\n브랜치: `dev`\n커밋: `${{ github.sha }}`\n로그: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
               }' \
               "${{ secrets.WEBHOOK_BACKEND }}"

      # 9) (Runner) 디스코드 알림 - 실패 시
      - name: Notify Discord (failure)
        if: ${{ failure() }}
        run: |
          curl -H "Content-Type: application/json" \
               -d '{
                 "content": "❌ *배포 실패*\n브랜치: `dev`\n커밋: `${{ github.sha }}`\n자세한 로그: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n원인 파악 후 재시도 바랍니다."
               }' \
               "${{ secrets.WEBHOOK_BACKEND }}"

