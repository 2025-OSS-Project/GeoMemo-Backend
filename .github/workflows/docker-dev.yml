name: Docker Build & Health Tests

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  build-health:
    runs-on: ubuntu-latest

    steps:
      # 1. 레포 체크아웃
      - name: Checkout dev branch
        uses: actions/checkout@v3
        with:
          ref: dev
          fetch-depth: 0

      # 2. .env 복원
      - name: Restore .env from ENV secret
        run: |
          cat <<EOF > .env
          ${{ secrets.ENV }}
          EOF

      # 3. Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Docker 이미지 빌드
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: geomemo-backend:dev-${{ github.sha }}

      # 5. 컨테이너 백그라운드 실행
      - name: Run container in background
        run: |
          docker run -d --name geomemo-test \
            -p 8000:8000 \
            --env-file .env \
            geomemo-backend:dev-${{ github.sha }}

      # 6. 컨테이너 준비 대기 (최대 10회, 5초 간격)
      - name: Wait for container startup
        run: |
          for i in {1..10}; do
            curl -s http://localhost:8000/health && break || sleep 5
          done

      # 7. HTTP Health Check
      - name: HTTP health check
        run: |
          curl -sSf http://localhost:8000/health

      # 8. DB Health Check
      - name: Database health check
        run: |
          curl -sSf http://localhost:8000/dbhealth

      # 9. 컨테이너 정리
      - name: Stop and remove container
        run: |
          docker stop geomemo-test
          docker rm geomemo-test
