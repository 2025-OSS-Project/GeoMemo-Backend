name: Docker Build, Health Tests & (Optional) Push

on:
  push:
    branches:
      - dev
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to run (e.g., feature/my-branch or dev)'
        required: true
        default: 'dev'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-health:
    runs-on: ubuntu-latest

    steps:
      # 1) 체크아웃: PR/수동실행/푸시 모두에서 올바른 ref
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.head_ref || github.ref }}

      # 2) .env 복원 (포크 PR은 시크릿 미제공 → 건너뛰기)
      - name: Restore .env from ENV secret
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        run: |
          cat <<EOF > .env
          ${{ secrets.ENV }}
          EOF

      - name: Note when DB tests will be skipped (fork PR)
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true }}
        run: echo "Fork PR detected → secrets not available; DB health check will be skipped."

      # 3) Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4) 빌드 + 로컬 로드(중요)
      - name: Build Docker image (load to local engine)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: geomemo-backend:dev-${{ github.sha }}

      - name: Verify image locally available
        run: docker image inspect geomemo-backend:dev-${{ github.sha }}

      # 5) 컨테이너 실행 (포크 PR도 실행 가능)
      - name: Run container in background
        run: |
          docker run -d --name geomemo-test \
            -p 8000:8000 \
            $( [ -f .env ] && echo "--env-file .env" ) \
            geomemo-backend:dev-${{ github.sha }}

      # 6) 기동 대기
      - name: Wait for container startup
        run: |
          for i in {1..15}; do
            curl -s http://localhost:8000/health && break || sleep 4
          done

      # 7) 앱 헬스 체크
      - name: HTTP health check
        run: curl -sSf http://localhost:8000/health

      # 8) DB 헬스 체크 (시크릿 있을 때만)
      - name: Database health check
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        run: curl -sSf http://localhost:8000/dbhealth

      # 9) 로그 및 정리(항상)
      - name: Stop and remove container
        if: always()
        run: |
          docker logs geomemo-test || true
          docker stop geomemo-test || true
          docker rm geomemo-test || true

      # 10. AWS 자격증명 구성
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}                # 리전 설정 :contentReference[oaicite:0]{index=0}

      # 11. Amazon ECR 로그인
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1               # Private ECR 로그인 :contentReference[oaicite:1]{index=1}

      # 12. 이미지 태깅 & 푸시
      - name: Tag and push image to ECR
        run: |
          IMAGE_URI=067258969425.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/geomemo
          docker tag geomemo-backend:dev-${{ github.sha }} $IMAGE_URI:dev-${{ github.sha }}
          docker push $IMAGE_URI:dev-${{ github.sha }}        # ECR에 이미지 업로드 :contentReference[oaicite:2]{index=2}
