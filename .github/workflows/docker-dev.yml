name: Docker Build, Health Tests, Push

on:
  push:
    branches:
      - dev
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to run (e.g., feature/my-branch or dev)'
        required: true
        default: 'dev'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------
  # 1️⃣ 로컬 빌드·헬스체크 후 ECR Push
  # ------------------------------------------------------------
  build-health:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.head_ref || github.ref }}

      # Buildx 설정
      - uses: docker/setup-buildx-action@v3

      # 이미지 빌드(+로컬 로드)
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: geomemo-backend:dev-${{ github.sha }}

      # 로컬 컨테이너로 헬스체크
      - name: Run container locally
        run: |
          docker run -d --name geomemo-test -p 8000:8000 geomemo-backend:dev-${{ github.sha }}

      - name: Wait for /api/health 200
        run: |
          for i in {1..20}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health || true)
            [ "$code" = 200 ] && exit 0
            sleep 3
          done
          echo "local health check failed" && exit 1

      - name: Clean up local container
        if: always()
        run: |
          docker stop geomemo-test || true
          docker rm   geomemo-test || true

      # dev 브랜치 push 시 ECR 업로드
      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag & push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
        run: |
          IMAGE=067258969425.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/geomemo:dev-${{ github.sha }}
          docker tag geomemo-backend:dev-${{ github.sha }} $IMAGE
          docker push $IMAGE

  # ------------------------------------------------------------
  # 2️⃣ EC2 원격 배포 (런타임에 .env 주입)
  # ------------------------------------------------------------
  deploy-to-ec2:
    needs: build-health
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    timeout-minutes: 25

    steps:
      # 2-1) .env 파일 생성 (.env 내용은 GitHub Secrets ENV)
      - name: EC2 ─ create .env from secret
        uses: appleboy/ssh-action@v1.2.2
        with:
          host:       ${{ secrets.EC2_HOST }}
          username:   ${{ secrets.EC2_USER }}
          key:        ${{ secrets.EC2_SSH_KEY }}
          port:       22
          script: |
            set -e
            mkdir -p /home/${{ secrets.EC2_USER }}/app
            cat <<'EOF' > /home/${{ secrets.EC2_USER }}/app/.env
            ${{ secrets.ENV }}
            EOF
            chmod 600 /home/${{ secrets.EC2_USER }}/app/.env

      # 2-2) ECR 로그인 & 최신 이미지 Pull
      - name: EC2 ─ ECR login & pull
        uses: appleboy/ssh-action@v1.2.2
        with:
          host:       ${{ secrets.EC2_HOST }}
          username:   ${{ secrets.EC2_USER }}
          key:        ${{ secrets.EC2_SSH_KEY }}
          port:       22
          script: |
            set -e
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/geomemo:dev-${{ github.sha }}

      # 2-3) 기존 컨테이너 정리 & 새 컨테이너 실행
      - name: EC2 ─ deploy container
        uses: appleboy/ssh-action@v1.2.2
        with:
          host:       ${{ secrets.EC2_HOST }}
          username:   ${{ secrets.EC2_USER }}
          key:        ${{ secrets.EC2_SSH_KEY }}
          port:       22
          script: |
            docker stop geomemo || true
            docker rm   geomemo || true
            docker run -d --name geomemo \
              -p 8000:8000 \
              --env-file /home/${{ secrets.EC2_USER }}/app/.env \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/geomemo:dev-${{ github.sha }}

      # 2-4) /api/health & DB 헬스체크
      - name: EC2 ─ health checks
        uses: appleboy/ssh-action@v1.2.2
        with:
          host:       ${{ secrets.EC2_HOST }}
          username:   ${{ secrets.EC2_USER }}
          key:        ${{ secrets.EC2_SSH_KEY }}
          port:       22
          script: |
            for i in {1..20}; do
              code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health || true)
              [ "$code" = 200 ] && break
              sleep 3
            done
            curl -sSf http://localhost:8000/api/health
            curl -sSf http://localhost:8000/api/dbhealth

      # 2-5) 성공 알림
      - name: Notify Discord (success)
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
               -d '{"content":"✅ *배포 성공* (`dev`, `${{ github.sha }}`)\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}>"}' \
               "${{ secrets.WEBHOOK_BACKEND }}"

      # 2-6) 실패 알림
      - name: Notify Discord (failure)
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
               -d '{"content":"❌ *배포 실패* (`dev`, `${{ github.sha }}`)\n로그: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}>"}' \
               "${{ secrets.WEBHOOK_BACKEND }}"
