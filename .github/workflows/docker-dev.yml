name: Docker Build & RDS Test

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. 레포 체크아웃
      - name: Checkout dev branch
        uses: actions/checkout@v3
        with:
          ref: dev
          fetch-depth: 0

      # 2. .env 파일 복원
      - name: Restore .env from ENV secret
        run: |
          cat <<EOF > .env
          ${{ secrets.ENV }}
          EOF

      # 3. Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 4. Docker 이미지 빌드
      - name: Build Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: geomemo-backend:dev-${{ github.sha }}

      # 5. MySQL 클라이언트 설치
      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      # 6. RDS MySQL 연결 테스트
      - name: Test RDS MySQL connection
        run: |
          docker run --rm \
            --env-file .env \
            geomemo-backend:dev-${{ github.sha }} \
            sh -c "mysql -h \"$DB_HOST\" -u \"$DB_USER\" -p\"$DB_PASS\" -e 'SELECT 1;'"
